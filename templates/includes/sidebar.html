{% load i18n %}
{% load template_tags %}

<div class="col-lg-4">
    <div class="sidebar">
        <div class="row">
            <div class="col-lg-12">
                <div class="sidebar-item search">
                    <form id="search_form" name="gs" method="GET" action="{% url 'blog:search_articles' %}">
                        <input type="text" name="q" class="searchText" placeholder="{% trans 'type to search...' %}"
                               autocomplete="on"
                               value="{% if request.GET.q %}{{ request.GET.q }}{% endif %}">
                    </form>
                </div>
            </div>
            <div class="col-lg-12">
                <div class="sidebar-item recent-posts">
                    <div class="sidebar-heading">
                        <h2>{% trans 'Recent Articles' %}</h2>
                    </div>
                    <div class="content">
                        <ul>
                            {% recent_articles_tag recent_articles %}
                        </ul>
                    </div>
                </div>
            </div>
            <div class="col-lg-12">
                <div class="sidebar-item categories">
                    <div class="sidebar-heading">
                        <h2>{% trans 'Categories' %}</h2>
                    </div>
                    <div class="content">
                        <ul>
                            {% for category in categories %}
                                <li>
                                    <a href="{% url 'blog:all_articles_on_category' category.id %}">- {{ category.title }}</a>
                                </li>
                            {% endfor %}
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
