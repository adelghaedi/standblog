{% load i18n %}

<header class="">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home:index' %}"><h2>{% trans 'Article Blog' %}<em>.</em></h2></a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive"
                    aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item {% if request.resolver_match.url_name == 'index' %} active {% endif %}">
                        <a class="nav-link" href="{% url 'home:index' %}">{% trans 'Home' %}
                            <span class="sr-only">(current)</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'all_articles' %} active {% endif %}"
                           href="{% url 'blog:all_articles' %}">{% trans 'All Articles' %}</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'article_detail' %} active {% endif %}"
                           href="javascript:void(0);">{% trans 'Post Details' %}</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'contact_us' %} active {% endif %}"
                           href="{% url 'blog:contact_us' %}">{% trans 'Contact Us' %}</a>
                    </li>
                    {% include 'includes/profile.html' %}
                </ul>
            </div>
        </div>
    </nav>
</header>
